[project]
site_name = "Crestr Documentation"

# Theme configuration
theme.name = "material"
theme.logo = "assets/images/Crest-Logo.png"
theme.variant = "modern"
theme.favicon = "favicon.ico"          # ← use .ico or .png

theme.features = [
    "navigation.tabs",
    "navigation.sections",
    "content.code.copy",
    # "content.action.edit",
]

# Palette (light + dark)
[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "amber"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to Dark Mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "amber"

[project.theme.palette.toggle]
icon = "material/weather-night"
name = "Switch to Light Mode"

# Navigation
[[project.nav]]
Home = "index.md"

[[project.nav]]
"Roadmap" = [
    { "Overview" = "roadmap/overview.md" },
    { "2025" = "roadmap/2025.md" },
    { "2026" = "roadmap/2026.md" },
    { "2027" = "roadmap/2027.md" }
]

[[project.nav]]
"User Guide" = [
    { "Getting Started" = "user/getting-started.md" },
    { "Automatic Routing" = "user/automatic-routing.md" },
    { "Manual Routing" = "user/manual-routing.md" },
    { "Exporting Routes" = "user/exporting-routes.md" }
]

[[project.nav]]
"Technical" = [
    { "Architecture Overview" = "technical/architecture.md" },
    { "Data Preprocessing" = "technical/data-preprocessing.md" },
    { "Routing Engine (A*)" = "technical/routing-engine.md" },
    { "KDTree" = "technical/kdtree.md" },
    { "Elevation Pipeline" = "technical/elevation.md" },
    { "Backend API" = "technical/backend-api.md" },
    { "Frontend Architecture" = "technical/frontend-architecture.md" }
]

# Plugins
project.plugins = ["search"]

# Markdown extensions
project.markdown_extensions = [
    "attr_list",
    "admonition",
    "pymdownx.details",
    "pymdownx.superfences",
]